# 17lands dbt project - transforms raw data into staging, intermediate, and marts
# Run from project root: dbt run

name: "seventeen_lands"
version: "1.0.0"
config-version: 2

profile: "seventeen_lands"

# Set has_replay: true when raw.replay exists (e.g. after ingesting replay).
vars:
  has_replay: false
  # Unpivot mart is very large; enable only when needed: dbt run --vars '{"build_pack_pool_mart": true}'
  build_pack_pool_mart: false

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  seventeen_lands:
    +materialized: table
    staging:
      +schema: staging
      +materialized: table
    marts:
      +schema: marts
      +materialized: table
